name: Video Encoder Workflow

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task type (hsub or resize)'
        required: true
      video_id:
        description: 'Telegram Video ID'
        required: true
      sub_id:
        description: 'Telegram Subtitle ID'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      resolution:
        description: 'Target Resolution (if resize)'
        required: true

jobs:
  encode_job:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto

      - name: Run Encoder Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          SUB_ID: ${{ github.event.inputs.sub_id }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
        run: python encoder.py
