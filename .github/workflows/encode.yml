
name: Video Encoder Worker

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'resize or hsub'
        required: true
      video_id:
        required: true
      sub_id:
        required: false
      wm_id:
        required: false
      wm_pos:
        required: false
      chat_id:
        required: true
      target_res:
        required: false
      rename_text:
        required: false

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install ffmpeg -y

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto

      - name: Run Encoder Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          SUB_ID: ${{ github.event.inputs.sub_id }}
          WM_ID: ${{ github.event.inputs.wm_id }}
          WM_POS: ${{ github.event.inputs.wm_pos }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          TARGET_RES: ${{ github.event.inputs.target_res }}
          RENAME_TEXT: ${{ github.event.inputs.rename_text }}
        run: python encoder.py
